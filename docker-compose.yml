services:
  postgres:
    image: postgres:15
    container_name: kineai-db-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: kineai
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: kineai_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
