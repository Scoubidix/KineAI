<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Test Runner — Mon Assistant Kiné</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
    header { padding: 16px 24px; background: #1e293b; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    h1 { font-size: 18px; margin: 0 16px 0 0; }
    button { font-size: 14px; padding: 8px 16px; border: 0; border-radius: 6px; cursor: pointer; background: #334155; color: #e2e8f0; }
    button:hover:not(:disabled) { background: #475569; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    button.primary { background: #2563eb; }
    button.copy { background: #b91c1c; margin-left: auto; }
    .counts { display: flex; gap: 16px; padding: 12px 24px; font-weight: 600; }
    .counts .p { color: #4ade80; } .counts .f { color: #f87171; } .counts .s { color: #94a3b8; }
    main { display: flex; gap: 16px; padding: 16px 24px; align-items: flex-start; }
    #grid { flex: 1; }
    .suite { margin-bottom: 16px; }
    .suite h3 { font-size: 14px; margin: 0 0 6px; color: #cbd5e1; }
    .row { display: flex; gap: 10px; padding: 4px 8px; border-radius: 4px; font-size: 13px; align-items: baseline; }
    .row:nth-child(even) { background: #1e293b; }
    .badge { font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 4px; min-width: 56px; text-align: center; }
    .passed { background: #14532d; color: #4ade80; }
    .failed { background: #7f1d1d; color: #fca5a5; }
    .skipped { background: #334155; color: #94a3b8; }
    .err { color: #fca5a5; font-family: monospace; font-size: 11px; white-space: pre-wrap; margin: 2px 0 6px 66px; }
    #logs { width: 420px; height: 70vh; overflow: auto; background: #020617; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 11px; white-space: pre-wrap; }
    .status { padding: 0 24px; color: #94a3b8; font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <h1>🧪 Test Runner</h1>
    <button id="btn-all" class="primary">Tout</button>
    <button id="btn-jest">Jest</button>
    <button id="btn-e2e">e2e</button>
    <button id="btn-copy" class="copy" disabled>Copier les échecs (JSON)</button>
  </header>
  <div class="status" id="status">Prêt.</div>
  <div class="counts" id="counts" style="display:none">
    <span class="p" id="c-pass">0 passed</span>
    <span class="f" id="c-fail">0 failed</span>
    <span class="s" id="c-skip">0 skipped</span>
  </div>
  <main>
    <div id="grid"></div>
    <pre id="logs"></pre>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const buttons = ['btn-all', 'btn-jest', 'btn-e2e'].map($);
    let lastResults = [];
    let lastTarget = null;

    const es = new EventSource('/events');
    // Événement 'connected' envoyé par le serveur à l'ouverture — on l'ignore simplement.
    es.addEventListener('connected', () => {});
    es.addEventListener('log', (e) => {
      const logs = $('logs');
      logs.textContent += JSON.parse(e.data) + '\n';
      logs.scrollTop = logs.scrollHeight;
    });
    es.addEventListener('summary', (e) => {
      const { results, counts } = JSON.parse(e.data);
      lastResults = results;
      renderGrid(results);
      renderCounts(counts);
      $('btn-copy').disabled = counts.failed === 0;
    });
    // En cas d'erreur serveur : 'error' puis 'done' sans 'summary' — la grille reste vide, ce qui est correct.
    es.addEventListener('error', (e) => {
      $('status').textContent = 'Erreur : ' + JSON.parse(e.data).message;
    });
    es.addEventListener('done', () => {
      buttons.forEach((b) => (b.disabled = false));
      $('status').textContent = 'Terminé.';
    });

    function run(target) {
      lastTarget = target;
      lastResults = [];
      $('logs').textContent = '';
      $('grid').innerHTML = '';
      $('counts').style.display = 'none';
      $('btn-copy').disabled = true;
      buttons.forEach((b) => (b.disabled = true));
      $('status').textContent = 'En cours (' + target + ')…';
      fetch('/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ target }),
      }).then((r) => {
        if (!r.ok) {
          buttons.forEach((b) => (b.disabled = false));
          r.json().then((j) => ($('status').textContent = 'Refusé : ' + j.error));
        }
      });
    }
    $('btn-all').onclick = () => run('all');
    $('btn-jest').onclick = () => run('jest');
    $('btn-e2e').onclick = () => run('e2e');

    function renderCounts(c) {
      $('counts').style.display = 'flex';
      $('c-pass').textContent = c.passed + ' passed';
      $('c-fail').textContent = c.failed + ' failed';
      $('c-skip').textContent = c.skipped + ' skipped';
    }

    function renderGrid(results) {
      const grid = $('grid');
      grid.innerHTML = '';
      const bySuite = {};
      for (const r of results) (bySuite[r.suite] = bySuite[r.suite] || []).push(r);
      for (const suite of Object.keys(bySuite)) {
        const box = document.createElement('div');
        box.className = 'suite';
        const h = document.createElement('h3');
        h.textContent = suite;
        box.appendChild(h);
        for (const r of bySuite[suite]) {
          const row = document.createElement('div');
          row.className = 'row';
          // Badge + nom via textContent/className (pas d'injection brute, même pour r.status).
          const badge = document.createElement('span');
          badge.className = 'badge ' + r.status;
          badge.textContent = r.status;
          const name = document.createElement('span');
          name.textContent = r.name;
          row.appendChild(badge);
          row.appendChild(name);
          box.appendChild(row);
          if (r.error) {
            const err = document.createElement('div');
            err.className = 'err';
            err.textContent = r.error;
            box.appendChild(err);
          }
        }
        grid.appendChild(box);
      }
    }

    $('btn-copy').onclick = () => {
      const failing = lastResults
        .filter((r) => r.status === 'failed')
        .map((r) => ({ suite: r.suite, name: r.name, error: r.error }));
      const payload = JSON.stringify({ target: lastTarget, failing }, null, 2);
      navigator.clipboard.writeText(payload).then(() => {
        $('status').textContent = failing.length + ' échec(s) copié(s) dans le presse-papier.';
      }).catch((err) => {
        $('status').textContent = 'Échec de la copie : ' + err.message;
      });
    };
  </script>
</body>
</html>
